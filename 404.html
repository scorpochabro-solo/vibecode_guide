 у вас на компьютере живёт агент-программист.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#claude-4"},{"@type":"HowToStep","position":5,"name":"Плагины: прокачиваем агента","text":"Плагин — это «отправить сотрудника на курсы»: одна команда, и агент получает новые навыки. Ставим дизайн-мозг и памятку.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#claude-5"},{"@type":"HowToStep","position":6,"name":"Конвейер «Идея → Продукт»","text":"Центральная глава. Соединяем всё в один процесс, который вы будете повторять для каждой новой идеи.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#claude-6"},{"@type":"HowToStep","position":7,"name":"Типичные ошибки новичка","text":"Девять граблей, на которые наступают все. Прочитайте один раз — сэкономите несколько вечеров.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#claude-7"}]},{"@type":"HowTo","name":"Путь Codex: от установки до первого продукта — От идеи до продукта","inLanguage":"ru","step":[{"@type":"HowToStep","position":1,"name":"Аккаунт ChatGPT и приложение","text":"Регистрируемся, разбираемся с планами и ставим официальное приложение ChatGPT — внутри него живёт Codex.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-1"},{"@type":"HowToStep","position":2,"name":"Первые промпты","text":"Короткая глава: промптам всё равно, какой у вас агент.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-2"},{"@type":"HowToStep","position":3,"name":"Генератор промптов в ChatGPT","text":"Тот же генератор, что и в главе 1.3, — потому что промпт универсален и не привязан к инструменту.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-3"},{"@type":"HowToStep","position":4,"name":"Codex на Windows","text":"Основной путь — прямо в приложении, без терминала. Для смелых — Codex CLI одной командой.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-4"},{"@type":"HowToStep","position":5,"name":"Скиллы и AGENTS.md","text":"Памятка для Codex называется AGENTS.md, а дизайн-мозг из главы 1.5 ставится и сюда — одной командой.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-5"},{"@type":"HowToStep","position":6,"name":"Тот же конвейер «Идея → Продукт»","text":"Система промптов не зависит от инструмента — меняется только окно, в котором вы говорите «ок».","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-6"},{"@type":"HowToStep","position":7,"name":"Ошибки и отличия от Claude","text":"Все девять граблей из главы 1.7 действуют и здесь. Ниже — то, что специфично для Codex.","url":"https://scorpochabro-solo.github.io/vibecode_guide/#codex-7"}]},{"@type":"FAQPage","inLanguage":"ru","mainEntity":[{"@type":"Question","name":"Я сломаю компьютер?","acceptedAnswer":{"@type":"Answer","text":"Нет. Агент работает в отдельной папке проекта и спрашивает разрешение на действия; у Codex есть песочница, у Claude Code — режимы разрешений. Худший реалистичный сценарий — сломается сам проект, и тогда вы просто создадите новую папку и соберёте заново (во второй раз это быстрее)."}},{"@type":"Question","name":"Нужно ли учить программирование?","acceptedAnswer":{"@type":"Answer","text":"Для задач этого гайда — нет: код пишет агент, ваша работа — формулировать задачу и принимать решения. Понимать по чуть-чуть, что происходит, всё же полезно — для этого в гайде объясняется каждый термин, а внизу есть глоссарий."}},{"@type":"Question","name":"Что дешевле — Claude или Codex?","acceptedAnswer":{"@type":"Answer","text":"Цены меняются, поэтому в гайде их нет — смотрите официальные страницы тарифов (ссылки в главах 1.1 и 2.1). Ориентир по фактам на дату проверки: Claude Code требует платный план (Pro и выше), а Codex формально доступен даже на бесплатном плане ChatGPT, но с маленькими лимитами — для реальной работы нужен Plus и выше."}},{"@type":"Question","name":"Агент может удалить мои файлы?","acceptedAnswer":{"@type":"Answer","text":"Агент работает с файлами внутри папки проекта — за её пределы Codex не выходит без разрешения, а Claude Code спрашивает подтверждение на команды. Дополнительная страховка: правило «спрашивай перед удалением» в CLAUDE.md/AGENTS.md (шаблон в главах 1.5 и 2.5) и привычка не держать в папке проекта ничего постороннего."}},{"@type":"Question","name":"Claude или Codex — что выбрать?","acceptedAnswer":{"@type":"Answer","text":"Оба доведут вас до результата, конвейер гайда одинаковый для обоих. Практичный критерий: если вы уже платите за ChatGPT — начните с Codex; если нет — сравните таблицу выше и попробуйте путь Claude. Менять решение не страшно: система промптов переносится целиком."}},{"@type":"Question","name":"Агент сделал не то. Что делать?","acceptedAnswer":{"@type":"Answer","text":"Это нормальный режим работы, а не катастрофа. Опишите проблему по формуле из промпта «Почини»: что делали, что ожидали, что произошло, плюс скриншот. И просите правки по одной — маленькими итерациями, а не «переделай всё»."}},{"@type":"Question","name":"Куда уходят мои данные?","acceptedAnswer":{"@type":"Answer","text":"Файлы папки проекта читает агент, и они обрабатываются на серверах Anthropic или OpenAI по их политикам конфиденциальности. Практическое правило: не кладите в папку проекта пароли, сканы документов и чужие персональные данные — для сайта-продукта они и не нужны."}},{"@type":"Question","name":"Нужен ли мощный компьютер?","acceptedAnswer":{"@type":"Answer","text":"Нет. Вся тяжёлая работа происходит в облаке. Требования скромные: Claude Code — Windows 10 1809+ и 4 ГБ памяти; приложение ChatGPT — Windows 10 версии 2004+ (для Codex рекомендован Windows 11)."}},{"@type":"Question","name":"Команда из гайда не сработала. Почему?","acceptedAnswer":{"@type":"Answer","text":"Скорее всего, инструмент обновился — они меняются быстро, поэтому у каждой инструкции стоит дата проверки. Что делать: для Claude Code запустите claude doctor, перепроверьте команду в официальной документации (ссылки в конце глав) — и помните про типовые причины: не перезапущен терминал, открыт CMD вместо PowerShell."}}]}]}</script><script src="/vibecode_guide/_next/static/chunks/webpack-828c1be92b410fb3.js" id="_R_" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:\"$Sreact.fragment\"\n2:I[2000,[\"700\",\"static/chunks/700-6137684b438be3ca.js\",\"177\",\"static/chunks/app/layout-eda4faac446d8599.js\"],\"default\"]\n3:I[9766,[],\"\"]\n4:I[8924,[],\"\"]\na:I[7150,[],\"\"]\n:HL[\"/vibecode_guide/_next/static/media/44bad85e2cdaf490-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/vibecode_guide/_next/static/media/6e50af2f4c313e23-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/vibecode_guide/_next/static/media/b8a4ce73684c73f2-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/vibecode_guide/_next/static/media/c1f853e4758089a8-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/vibecode_guide/_next/static/css/0488094bd0137075.css\",\"style\"]\n5:T2982,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"HowTo\",\"name\":\"Путь Claude: от установки до первого продукта — От идеи до продукта\",\"inLanguage\":\"ru\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Регистрация и приложение\",\"text\":\"Заводим аккаунт, оформляем план и ставим приложение Claude на Windows. Здесь ещё ничего не может пойти не так.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-1\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Первые промпты: 15-минутный практикум\",\"text\":\"Промпт — это техзадание словами. Здесь мы научимся отличать промпт, который даёт результат, от промпта, который даёт «что-то среднее».\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-2\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Проект «Генератор промптов»\",\"text\":\"Собираем себе персонального промпт-инженера: кидаете в проект сырую идею — получаете профессиональное ТЗ для агента.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-3\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Установка Claude Code на Windows\",\"text\":\"Самая «страшная» глава — с терминалом. На деле: одна команда, три минуты, и у вас на компьютере живёт агент-программист.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-4\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Плагины: прокачиваем агента\",\"text\":\"Плагин — это «отправить сотрудника на курсы»: одна команда, и агент получает новые навыки. Ставим дизайн-мозг и памятку.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-5\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Конвейер «Идея → Продукт»\",\"text\":\"Центральная глава. Соединяем всё в один процесс, который вы будете повторять для каждой новой идеи.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-6\"},{\"@type\":\"HowToStep\",\"position\":7,\"name\":\"Типичные ошибки новичка\",\"text\":\"Девять граблей, на которые наступают все. Прочитайте один раз — сэкономите несколько вечеров.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#claude-7\"}]},{\"@type\":\"HowTo\",\"name\":\"Путь Codex: от установки до первого продукта — От идеи до продукта\",\"inLanguage\":\"ru\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Аккаунт ChatGPT и приложение\",\"text\":\"Регистрируемся, разбираемся с планами и ставим официальное приложение ChatGPT — внутри него живёт Codex.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-1\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Первые промпты\",\"text\":\"Короткая глава: промптам всё равно, какой у вас агент.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-2\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Генератор промптов в ChatGPT\",\"text\":\"Тот же генератор, что и в главе 1.3, — потому что промпт универсален и не привязан к инструменту.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-3\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Codex на Windows\",\"text\":\"Основной путь — прямо в приложении, без терминала. Для смелых — Codex CLI одной командой.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-4\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Скиллы и AGENTS.md\",\"text\":\"Памятка для Codex называется AGENTS.md, а дизайн-мозг из главы 1.5 ставится и сюда — одной командой.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-5\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Тот же конвейер «Идея → Продукт»\",\"text\":\"Система промптов не зависит от инструмента — меняется только окно, в котором вы говорите «ок».\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-6\"},{\"@type\":\"HowToStep\",\"position\":7,\"name\":\"Ошибки и отличия от Claude\",\"text\":\"Все девять граблей из главы 1.7 действуют и здесь. Ниже — то, что специфично для Codex.\",\"url\":\"https://scorpochabro-solo.github.io/vibecode_guide/#codex-7\"}]},{\"@type\":\"FAQPage\",\"inLanguage\":\"ru\",\"mainEntity\":[{\"@type\":\"Question\",\"name\":\"Я сломаю компьютер?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Нет. Агент работает в отдельной папке проекта и спрашивает разрешение на действия; у Codex есть песочница, у Claude Code — режимы разрешений. Худший реалистичный сценарий — сломается сам проект, и тогда вы просто создадите новую папку и соберёте заново (во второй раз это быстрее).\"}},{\"@type\":\"Question\",\"name\":\"Нужно ли учить программирование?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Для задач этого гайда — нет: код пишет агент, ваша работа — формулировать задачу и принимать решения. Понимать по чуть-чуть, что происходит, всё же полезно — для этого в гайде объясняется каждый термин, а внизу есть глоссарий.\"}},{\"@type\":\"Question\",\"name\":\"Что дешевле — Claude или Codex?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Цены меняются, поэтому в гайде их нет — смотрите официальные страницы тарифов (ссылки в главах 1.1 и 2.1). Ориентир по фактам на дату проверки: Claude Code требует платный план (Pro и выше), а Codex формально доступен даже на бесплатном плане ChatGPT, но с маленькими лимитами — для реальной работы нужен Plus и выше.\"}},{\"@type\":\"Question\",\"name\":\"Агент может удалить мои файлы?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Агент работает с файлами внутри папки проекта — за её пределы Codex не выходит без разрешения, а Claude Code спрашивает подтверждение на команды. Дополнительная страховка: правило «спрашивай перед удалением» в CLAUDE.md/AGENTS.md (шаблон в главах 1.5 и 2.5) и привычка не держать в папке проекта ничего постороннего.\"}},{\"@type\":\"Question\",\"name\":\"Claude или Codex — что выбрать?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Оба доведут вас до результата, конвейер гайда одинаковый для обоих. Практичный критерий: если вы уже платите за ChatGPT — начните с Codex; если нет — сравните таблицу выше и попробуйте путь Claude. Менять решение не страшно: система промптов переносится целиком.\"}},{\"@type\":\"Question\",\"name\":\"Агент сделал не то. Что делать?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Это нормальный режим работы, а не катастрофа. Опишите проблему по формуле из промпта «Почини»: что делали, что ожидали, что произошло, плюс скриншот. И просите правки по одной — маленькими итерациями, а не «переделай всё».\"}},{\"@type\":\"Question\",\"name\":\"Куда уходят мои данные?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Файлы папки проекта читает агент, и они обрабатываются на серверах Anthropic или OpenAI по их политикам конфиденциальности. Практическое правило: не кладите в папку проекта пароли, сканы документов и чужие персональные данные — для сайта-продукта они и не нужны.\"}},{\"@type\":\"Question\",\"name\":\"Нужен ли мощный компьютер?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Нет. Вся тяжёлая работа происходит в облаке. Требования скромные: Claude Code — Windows 10 1809+ и 4 ГБ памяти; приложение ChatGPT — Windows 10 версии 2004+ (для Codex рекомендован Windows 11).\"}},{\"@type\":\"Question\",\"name\":\"Команда из гайда не сработала. Почему?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Скорее всего, инструмент обновился — они меняются быстро, поэтому у каждой инструкции стоит дата проверки. Что делать: для Claude Code запустите claude doctor, перепроверьте команду в официальной документации (ссылки в конце глав) — и помните про типовые причины: не перезапущен терминал, открыт CMD вместо PowerShell.\"}}]}]}"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"22-0-C4bDEqTgxBgurxI4\",\"p\":\"/vibecode_guide\",\"c\":[\"\",\"_not-found\"],\"i\":false,\"f\":[[[\"\",{\"children\":[\"/_not-found\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[\"\",[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/vibecode_guide/_next/static/css/0488094bd0137075.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"ru\",\"data-accent\":\"neutral\",\"className\":\"__variable_37a167 __variable_de1d59 __variable_87c563\",\"children\":[\"$\",\"body\",null,{\"children\":[[\"$\",\"script\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"document.documentElement.classList.add('js')\"}}],[\"$\",\"$L2\",null,{\"children\":[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]}],[\"$\",\"script\",null,{\"type\":\"application/ld+js
